<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Instant WebSocket Chat Engine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Segoe UI', sans-serif; }
        .chat-container { max-width: 700px; margin: 50px auto; background: #1e293b; border: 2px solid #334155; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        #messageArea { height: 400px; overflow-y: auto; background: #0f172a; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
        .message-item { background: #334155; padding: 10px 15px; border-radius: 8px; margin-bottom: 12px; max-width: 80%; }
        .event-message { color: #38bdf8; text-align: center; font-style: italic; font-weight: 500; margin-bottom: 10px; }
        .sender-name { font-weight: 800; color: #fb7185; font-size: 0.85rem; display: block; margin-bottom: 3px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="username-page" class="text-center my-5 p-5 chat-container">
        <h2 class="fw-bold mb-4 text-info">🚀 Welcome to ChatEngine Pro</h2>
        <p class="text-secondary">Type your handle to establish a real-time full-duplex socket network.</p>
        <div class="w-75 mx-auto mt-4">
            <input type="text" id="name" class="form-control bg-dark text-white text-center py-2 border-secondary mb-3" placeholder="Enter Username..." autocomplete="off">
            <button onclick="connect()" class="btn btn-info w-100 fw-bold text-dark py-2">Join Global Chat Room</button>
        </div>
    </div>

    <div id="chat-page" class="chat-container p-4 hidden">
        <div class="d-flex justify-content-between align-items-center mb-3 border-bottom border-secondary pb-2">
            <h4 class="text-info m-0">💬 Live System Channel</h4>
            <span class="badge bg-success">Connected via /ws</span>
        </div>
        
        <div id="messageArea"></div>

        <div class="input-group mt-3">
            <input type="text" id="message" class="form-control bg-dark text-white border-secondary" placeholder="Type a message..." autocomplete="off">
            <button onclick="sendMessage()" class="btn btn-info text-dark fw-bold px-4">Send 🚀</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.1.4/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

<script>
    let stompClient = null;
    let username = null;

    function connect() {
        username = document.getElementById('name').value.trim();
        if(username) {
            document.getElementById('username-page').classList.add('hidden');
            document.getElementById('chat-page').classList.remove('hidden');

            const socket = new SockJS('/ws');
            stompClient = Stomp.over(socket);

            stompClient.connect({}, onConnected, onError);
        }
    }

    function onConnected() {
        stompClient.subscribe('/topic/public', onMessageReceived);
        stompClient.send("/app/chat.addUser", {}, JSON.stringify({sender: username, type: 'JOIN'}));
    }

    function onError(error) {
        alert('Could not connect to WebSocket server. Please refresh or check console.');
    }

    function sendMessage() {
        const messageContent = document.getElementById('message').value.trim();
        if(messageContent && stompClient) {
            const chatMessage = {
                sender: username,
                content: messageContent,
                type: 'CHAT'
            };
            stompClient.send("/app/chat.sendMessage", {}, JSON.stringify(chatMessage));
            document.getElementById('message').value = '';
        }
    }

    function onMessageReceived(payload) {
        const message = JSON.parse(payload.body);
        const messageArea = document.getElementById('messageArea');
        const messageElement = document.createElement('div');

        if(message.type === 'JOIN') {
            messageElement.classList.add('event-message');
            messageElement.innerText = '⚡ ' + message.sender + ' has entered the workspace!';
        } else if (message.type === 'LEAVE') {
            messageElement.classList.add('event-message');
            messageElement.innerText = '❌ ' + message.sender + ' left.';
        } else {
            messageElement.classList.add('message-item');
            
            const usernameElement = document.createElement('span');
            usernameElement.classList.add('sender-name');
            usernameElement.innerText = "@" + message.sender;
            
            const textElement = document.createElement('span');
            textElement.innerText = message.content;

            messageElement.appendChild(usernameElement);
            messageElement.appendChild(textElement);
        }

        messageArea.appendChild(messageElement);
        messageArea.scrollTop = messageArea.scrollHeight; // Auto scroll down
    }
</script>
</body>
</html>
